{% extends "base.html" %}
{% block title %}Scan failed — Lingo Hub{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-10 text-center">
  <div class="card p-8">
    <span class="inline-grid place-items-center w-14 h-14 rounded-2xl bg-red-50 border border-red-200 text-2xl">⚠️</span>
    <h1 class="text-xl font-extrabold tracking-tight mt-4">Check-in failed</h1>
    <p class="text-sm text-ink/50 mt-2">
      See the message above for what went wrong.
    </p>
    <a href="{% url 'scan_page' %}"
       class="mt-6 block w-full py-2.5 rounded-xl bg-primary-600 hover:bg-primary-500 active:bg-primary-700 text-white font-bold transition">
      Try again
    </a>
    <a href="{% url 'wallet' %}" class="mt-3 inline-block text-sm text-ink/50 hover:text-ink transition">
      Back home
    </a>
  </div>
</div>
{% endblock %}
