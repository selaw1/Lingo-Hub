{% extends "base.html" %}
{% block title %}Login — Lingo Hub{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-10">
  <div class="text-center mb-6">
    <span class="inline-grid place-items-center w-12 h-12 rounded-2xl bg-primary-500 text-white text-xl font-extrabold">L</span>
    <h1 class="text-2xl font-extrabold mt-4 tracking-tight">Welcome back</h1>
    <p class="text-sm text-ink/50 mt-1">Log in to see your Lingo Card.</p>
  </div>

  <div class="card p-6">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit"
              class="w-full mt-1 py-2.5 rounded-xl bg-primary-600 hover:bg-primary-500 active:bg-primary-700 text-white font-bold transition">
        Login
      </button>
    </form>
  </div>

  <p class="mt-5 text-center text-sm text-ink/50">
    No account?
    <a href="{% url 'register' %}" class="font-semibold text-primary-600 hover:text-primary-700 transition">Register</a>
  </p>
</div>
{% endblock %}
