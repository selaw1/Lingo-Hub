{% extends "base.html" %}
{% block title %}New session — Lingo Hub{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto">
  <a href="{% url 'session_list' %}" class="inline-flex items-center gap-1.5 text-sm text-ink/50 hover:text-ink transition mb-5">← Sessions</a>

  <div class="mb-5">
    <h1 class="text-2xl font-extrabold tracking-tight">New session</h1>
    <p class="text-sm text-ink/50 mt-1">Give it a name — the QR comes next.</p>
  </div>

  <div class="card p-6">
    <form method="post">
      {% csrf_token %}
      <p>
        <label for="title">Title</label>
        <input type="text" name="title" id="title" required placeholder="e.g. Monday Grammar Class" autofocus>
      </p>
      <button type="submit"
              class="w-full mt-1 py-2.5 rounded-xl bg-primary-600 hover:bg-primary-500 active:bg-primary-700 text-white font-bold transition">
        Create &amp; show QR
      </button>
    </form>
  </div>
</div>
{% endblock %}
