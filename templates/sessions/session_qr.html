{% extends "base.html" %}
{% block title %}{{ session.title }} — QR{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-6 text-center">
  <div class="glass p-7 relative overflow-hidden">
    <div class="absolute -top-24 left-1/2 -translate-x-1/2 w-72 h-72 rounded-full bg-primary-500/15 blur-3xl pointer-events-none" aria-hidden="true"></div>

    <h1 class="text-xl font-extrabold tracking-tight">{{ session.title }}</h1>
    <p class="text-xs text-white/50 mt-1.5 flex items-center justify-center gap-1.5">
      <span class="w-1.5 h-1.5 rounded-full bg-primary-400 animate-pulse"></span>
      Live — refreshes every 30s so screenshots go stale
    </p>

    <!-- QR needs a light background to stay scannable -->
    <div class="mt-6 mx-auto w-fit p-4 bg-white rounded-2xl shadow-[var(--glow-primary)]">
      <img id="qr-code" src="{% url 'session_qr_image' session.id %}" alt="Session QR code" class="block w-56 h-56">
    </div>

    <p class="text-[0.65rem] text-white/30 mt-5 font-mono break-all">{{ session.id }}</p>
  </div>

  <p class="mt-5">
    <a href="{% url 'session_list' %}" class="text-sm text-white/50 hover:text-white transition">← Back to sessions</a>
  </p>
</div>
{% endblock %}

{% block extra_js %}
<script>
  const qrImg = document.getElementById('qr-code');
  const baseSrc = qrImg.src;
  setInterval(() => {
    qrImg.src = baseSrc + '?t=' + Date.now();
  }, 30000);
</script>
{% endblock %}
